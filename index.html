<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Help Desk - Mockup Base</title>
    <style>
        /* Design system: variables CSS de color, tipografía y espaciado */
        :root {
            --primary-color: #2563eb;
            --bg-app: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-app);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--bg-card);
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-md);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }

        footer {
            background-color: var(--bg-card);
            padding: var(--spacing-md);
            border-top: 1px solid var(--border-color);
        }

        .api-key-container {
            display: flex;
            gap: var(--spacing-sm);
        }

        input, textarea, button {
            padding: var(--spacing-sm);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: inherit;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            border: none;
            padding: 8px 16px;
        }

        .chat-window {
            flex: 1;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            background: white;
            padding: var(--spacing-md);
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .message-placeholder {
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
        }

        .user { background: #dbeafe; align-self: flex-end; }
        .ai { background: #f3f4f6; align-self: flex-start; }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #f3f4f6;
            border-radius: 8px;
            padding: 10px 14px;
            gap: 4px;
            align-items: center;
        }
        .typing-indicator span {
            display: inline-block;
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing-bounce 1.2s ease-in-out infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing-bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-6px); }
        }

        .input-area {
            display: flex;
            gap: var(--spacing-sm);
        }

        textarea {
            flex: 1;
            resize: none;
        }

        #apiKeyInput:disabled {
            background: #f8fafc;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        #connectBtn.connected {
            background-color: #16a34a;
            cursor: default;
        }

        #sendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            align-self: flex-start;
            background: #fee2e2;
            color: #b91c1c;
            border-radius: 8px;
            padding: 10px;
            max-width: 80%;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Help Desk 1.0</h1>
        <div class="api-key-container">
            <input type="password" placeholder="Introduce tu API Key..." id="apiKeyInput">
            <button type="button" id="connectBtn" onclick="saveApiKey()">Conectar</button>
        </div>
    </header>

    <main>
        <div class="chat-window" id="chatWindow">
            <div class="message-placeholder ai">
                <strong>Soporte IA:</strong> Hola, soy tu asistente técnico. ¿En qué puedo ayudarte hoy?
            </div>
            <div class="message-placeholder user">
                <strong>Usuario:</strong> Hola, tengo un problema con el acceso al sistema.
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
        </div>
    </main>

    <footer>
        <div class="input-area">
            <textarea
                id="userInput"
                placeholder="Escribe tu consulta aquí..."
                rows="2"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button type="button" id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
    </footer>

    <script>
        /* ================================================================
           Módulo 1 → Estado: variables globales (apiKey, conversationHistory)
           Aquí se almacenará el estado persistente de la sesión.
        ================================================================ */
        let apiKey = '';
        let conversationHistory = [];

        /* ================================================================
           MÓDULO 2 — RAG: base de conocimiento
        ================================================================ */
        let KNOWLEDGE_BASE = '';

        async function loadKnowledgeBase() {
            try {
                const response = await fetch('./catalogo.txt');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                KNOWLEDGE_BASE = await response.text();
                
                // Construir System Prompt una vez cargado el catálogo
                buildSystemPrompt();
                
                console.log('✅ Base de conocimiento cargada correctamente');
            } catch (err) {
                console.error('Error cargando catálogo:', err);
                addMessage('error', 'No se pudo cargar el catálogo de conocimiento (catalogo.txt). El asistente funcionará sin RAG.');
            }
        }

        /* ================================================================
           MÓDULO 3 — System Prompt
        ================================================================ */
        let SYSTEM_PROMPT = '';

        function buildSystemPrompt() {
            SYSTEM_PROMPT = `Eres el asistente de AI Help Desk.
REGLAS CRÍTICAS:
1. Responde ÚNICAMENTE usando la información del catálogo proporcionado.
2. Si la información no está en el catálogo, di: "Esa información no está disponible. Te recomiendo contactar directamente con AI Help Desk."
3. Tono: profesional y conciso.
4. Nunca inventes datos que no estén en el catálogo.

BASE DE CONOCIMIENTO:
${KNOWLEDGE_BASE}`;
        }

        /* ================================================================
           Módulo 4 → API Key: función saveApiKey()
           Lógica para guardar/validar la llave (solo en memoria, sin LocalStorage).
        ================================================================ */
        function saveApiKey() {
            const input      = document.getElementById('apiKeyInput');
            const connectBtn = document.getElementById('connectBtn');
            const value      = input.value.trim();

            if (!value.startsWith('sk-')) {
                input.style.borderColor = '#ef4444';
                input.focus();
                setTimeout(() => input.style.borderColor = '', 1500);
                return;
            }

            apiKey = value;
            input.disabled = true;
            connectBtn.textContent = '✓ Conectado';
            connectBtn.classList.add('connected');
            connectBtn.disabled = true;

            document.getElementById('userInput').focus();
        }

        /* ================================================================
           Módulo 5 → Enviar mensaje: función sendMessage()
           Orquestador del flujo de envío y llamada a la API de OpenAI.
        ================================================================ */
        async function sendMessage() {
            const textarea = document.getElementById('userInput');
            const sendBtn  = document.getElementById('sendBtn');
            const text     = textarea.value.trim();

            if (!text) return;

            if (!apiKey) {
                addMessage('error', 'Primero conecta tu API Key para enviar mensajes.');
                return;
            }

            textarea.value = '';
            autoResize(textarea);
            sendBtn.disabled = true;

            addMessage('user', text);
            showTyping(true);

            conversationHistory.push({ role: 'user', content: text });

            try {
                const messages = [];
                if (SYSTEM_PROMPT) {
                    messages.push({ role: 'system', content: SYSTEM_PROMPT });
                }
                messages.push(...conversationHistory);

                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model:       'gpt-4o-mini',
                        temperature: 0.3,
                        max_tokens:  600,
                        messages:    messages
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    const errMsg  = errData?.error?.message || `Error HTTP ${response.status}`;
                    throw new Error(errMsg);
                }

                const data         = await response.json();
                const assistantMsg = data.choices?.[0]?.message?.content ?? '(Sin respuesta)';

                conversationHistory.push({ role: 'assistant', content: assistantMsg });

                showTyping(false);
                addMessage('ai', assistantMsg);

            } catch (err) {
                conversationHistory.pop();
                showTyping(false);
                addMessage('error', `Error al contactar la API: ${err.message}`);
            } finally {
                sendBtn.disabled = false;
                textarea.focus();
            }
        }

        /* ================================================================
           Módulo 6 → UI helpers: funciones de interfaz
           Funciones para limpiar el chat, scroll automático y renderizado de burbujas.
        ================================================================ */

        function addMessage(role, text) {
            const chatWindow      = document.getElementById('chatWindow');
            const typingIndicator = document.getElementById('typingIndicator');

            const bubble = document.createElement('div');

            if (role === 'error') {
                bubble.className   = 'error-msg';
                bubble.textContent = text;
            } else {
                bubble.className   = `message-placeholder ${role}`;
                const label        = role === 'ai' ? 'Soporte IA' : 'Usuario';
                bubble.innerHTML   = `<strong>${label}:</strong> ${escapeHtml(text)}`;
            }

            chatWindow.insertBefore(bubble, typingIndicator);
            scrollToBottom();
        }

        function showTyping(visible) {
            const indicator    = document.getElementById('typingIndicator');
            indicator.style.display = visible ? 'flex' : 'none';
            if (visible) scrollToBottom();
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 160) + 'px';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, ch => map[ch]);
        }

        function scrollToBottom() {
            const chatWindow = document.getElementById('chatWindow');
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        /* ================================================================
           Inicialización automática
        ================================================================ */
        window.onload = () => {
            loadKnowledgeBase();
        };
    </script>

</body>
</html>
